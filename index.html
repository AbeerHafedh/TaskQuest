<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TaskQuest - رحلة إنجازج</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="level-1">
    <div class="container">
        <header>
            <div class="header-top">
                <h1>⚔️ TaskQuest</h1>
                <div class="avatar-section">
                    <span id="avatarEmoji">🌱</span>
                    <span class="level-badge" id="levelDisplay">مستوى 1</span>
                </div>
            </div>

            <div class="quote-box" id="motivationQuote">
                "كل رحلة تبدأ بخطوة" 👣
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-label">نقاط</div>
                    <div class="stat-value" id="pointsDisplay">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-label">سلسلة</div>
                    <div class="stat-value" id="streakDisplay">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📋</div>
                    <div class="stat-label">مهام</div>
                    <div class="stat-value" id="tasksCount">0/0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🏆</div>
                    <div class="stat-label">إنجازات</div>
                    <div class="stat-value" id="achievementsCount">0</div>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-header">
                    <span>التقدم</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="levelProgressBar"></div>
                </div>
                <div class="next-level-info" id="nextLevelInfo"></div>
            </div>
        </header>

        <div class="shop-section">
            <h2>🛒 متجر الأفاتار</h2>
            <div class="shop-items" id="shopItems">
                <div class="shop-item" data-item="emoji1" data-price="30">
                    <div class="shop-item-emoji">⏰</div>
                    <div>منبه</div>
                    <div class="shop-item-price">30</div>
                </div>
                <div class="shop-item" data-item="emoji2" data-price="40">
                    <div class="shop-item-emoji">📚</div>
                    <div>كتب</div>
                    <div class="shop-item-price">40</div>
                </div>
                <div class="shop-item" data-item="emoji3" data-price="60">
                    <div class="shop-item-emoji">💪</div>
                    <div>قوة</div>
                    <div class="shop-item-price">60</div>
                </div>
                <div class="shop-item" data-item="emoji4" data-price="80">
                    <div class="shop-item-emoji">🏆</div>
                    <div>كأس</div>
                    <div class="shop-item-price">80</div>
                </div>
                <div class="shop-item" data-item="emoji5" data-price="100">
                    <div class="shop-item-emoji">👑</div>
                    <div>تاج</div>
                    <div class="shop-item-price">100</div>
                </div>
                <div class="shop-item" data-item="emoji6" data-price="120">
                    <div class="shop-item-emoji">🔥</div>
                    <div>لهب</div>
                    <div class="shop-item-price">120</div>
                </div>
                <div class="shop-item" data-item="emoji7" data-price="150">
                    <div class="shop-item-emoji">🚀</div>
                    <div>صاروخ</div>
                    <div class="shop-item-price">150</div>
                </div>
                <div class="shop-item" data-item="emoji8" data-price="200">
                    <div class="shop-item-emoji">💎</div>
                    <div>ألماسة</div>
                    <div class="shop-item-price">200</div>
                </div>
            </div>
        </div>

        <div class="add-task-section">
            <h2>➕ إضافة مهمة</h2>
            <div class="add-task-form">
                <div class="task-input-row">
                    <input type="text" id="taskNameInput" placeholder="شنو تريدين تنجزين؟">
                    <button id="addTaskBtn">➕</button>
                </div>
                <div class="task-options-row">
                    <select id="taskCategory">
                        <option value="عمل">💼 عمل</option>
                        <option value="دراسة">📚 دراسة</option>
                        <option value="صحة">💪 صحة</option>
                        <option value="شخصي">🌸 شخصي</option>
                    </select>
                    <select id="taskPointsSelect">
                        <option value="10">🐣 10</option>
                        <option value="20">⚡ 20</option>
                        <option value="30">🔥 30</option>
                        <option value="50">💀 50</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="challenges-section">
            <h2>⚡ تحديات اليوم</h2>
            <div id="dailyChallenges"></div>
        </div>

        <div class="tasks-section">
            <h2>📋 مهاماتي</h2>
            <div class="task-filters">
                <input type="text" id="taskSearch" placeholder="🔎 بحث">
                <select id="taskFilter">
                    <option value="all">الكل</option>
                    <option value="active">غير المكتملة</option>
                    <option value="completed">المكتملة</option>
                </select>
            </div>
            <div id="tasksList"></div>
        </div>

        <div class="progress-message" id="progressMessage"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
