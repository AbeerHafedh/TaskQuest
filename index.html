<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TaskQuest - رحلة إنجازج</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1e2b, #2d1f3a);
            min-height: 100vh;
            color: white;
            width: 100%;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        /* Responsive Grid */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .shop-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .add-task-form {
            display: flex;
            flex-direction: row;
            gap: 8px;
            flex-wrap: wrap;
        }

        .add-task-form input,
        .add-task-form select,
        .add-task-form button {
            flex: 1 1 auto;
            min-width: 120px;
        }

        /* Responsive Header */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            width: 100%;
        }

        .header-top {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .avatar-section {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #avatarEmoji {
            font-size: clamp(2rem, 6vw, 3rem);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .level-badge {
            background: #ffd700;
            color: #1a1e2b;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: clamp(0.8rem, 3vw, 1rem);
            white-space: nowrap;
        }

        .quote-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            margin: 15px 0;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            border-right: 5px solid #ffd700;
            font-style: italic;
            width: 100%;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 5px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .stat-card div:first-child {
            font-size: clamp(0.7rem, 3vw, 0.9rem);
        }

        .stat-value {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: bold;
            color: #ffd700;
        }

        /* Responsive Sections */
        .shop-section,
        .add-task-section,
        .challenges-section,
        .tasks-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            width: 100%;
        }

        h2 {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            margin-bottom: 10px;
        }

        .shop-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 8px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .shop-item-emoji {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            margin-bottom: 5px;
        }

        .shop-item-price {
            color: #ffd700;
            font-weight: bold;
            font-size: clamp(0.8rem, 3vw, 1rem);
        }

        input, select, button {
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: clamp(0.9rem, 3vw, 1rem);
            -webkit-appearance: none;
            appearance: none;
        }

        button {
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            color: #1a1e2b;
            font-weight: bold;
            cursor: pointer;
            min-width: 80px;
            white-space: nowrap;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-top: 8px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }

        .task-info span:first-child {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            word-break: break-word;
        }

        .task-points {
            background: #ffd700;
            color: #1a1e2b;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            white-space: nowrap;
        }

        .complete-btn, .delete-btn {
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            white-space: nowrap;
            display: inline-block;
        }

        .complete-btn {
            background: #4CAF50;
            color: white;
        }

        .delete-btn {
            background: #f44336;
            color: white;
            margin-right: 5px;
        }

        .challenge-item {
            background: rgba(255, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            margin-top: 8px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            border: 2px solid #ff4444;
        }

        .challenge-item span {
            font-size: clamp(0.9rem, 3.5vw, 1rem);
            word-break: break-word;
        }

        .progress-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            color: #ffd700;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            border: 2px solid #ffd700;
            display: none;
            z-index: 1000;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .shop-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Tablet Styles */
        @media screen and (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            
            .add-task-form {
                flex-direction: column;
            }
            
            .add-task-form input,
            .add-task-form select,
            .add-task-form button {
                width: 100%;
            }

            .task-item {
                flex-direction: column;
                align-items: stretch;
            }

            .task-info {
                justify-content: space-between;
            }

            .task-item > div:last-child {
                display: flex;
                justify-content: flex-end;
                gap: 8px;
            }
        }

        /* Mobile Styles */
        @media screen and (max-width: 480px) {
            .container {
                padding: 8px;
            }

            .header-top {
                flex-direction: column;
                text-align: center;
            }

            .avatar-section {
                width: 100%;
                justify-content: center;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 5px;
            }

            .shop-items {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .shop-item {
                padding: 10px 5px;
            }

            .task-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }

            .task-info span:first-child {
                width: 100%;
            }

            .task-points {
                align-self: flex-start;
            }

            .task-item > div:last-child {
                width: 100%;
                display: flex;
                gap: 8px;
            }

            .complete-btn, .delete-btn {
                flex: 1;
                text-align: center;
            }

            .challenge-item {
                flex-direction: column;
                text-align: center;
            }

            h1 {
                font-size: 1.8rem;
            }
        }

        /* Small Mobile Styles */
        @media screen and (max-width: 320px) {
            .stats-row {
                grid-template-columns: 1fr;
            }

            .shop-items {
                grid-template-columns: 1fr;
            }

            .avatar-section {
                flex-direction: column;
            }

            .level-badge {
                white-space: normal;
                text-align: center;
            }
        }

        /* Touch-friendly */
        .shop-item, 
        .complete-btn, 
        .delete-btn,
        button,
        #avatarEmoji {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* Level Backgrounds */
        .level-1 { background: linear-gradient(135deg, #2d3e4f, #1e2a3a); }
        .level-2 { background: linear-gradient(135deg, #3d6b5e, #2a4a40); }
        .level-3 { background: linear-gradient(135deg, #6b4f3d, #4a372a); }
        .level-4 { background: linear-gradient(135deg, #4f2d6b, #372a4a); }
        .level-5 { background: linear-gradient(135deg, #8b6b2d, #5e4a1e); }
    </style>
</head>
<body class="level-1">
    <div class="container">
        <header>
            <div class="header-top">
                <h1>⚔️ TaskQuest ⚔️</h1>
                <div class="avatar-section">
                    <span id="avatarEmoji">🌱</span>
                    <span class="level-badge" id="levelDisplay">مستوى 1 - مبتدئ</span>
                </div>
            </div>
            
            <div class="quote-box" id="motivationQuote">
                "كل رحلة تبدأ بخطوة" 👣
            </div>
            
            <div class="stats-row">
                <div class="stat-card">
                    <div>النقاط</div>
                    <div class="stat-value" id="pointsDisplay">0</div>
                </div>
                <div class="stat-card">
                    <div>🔥 السلسلة</div>
                    <div class="stat-value" id="streakDisplay">0</div>
                </div>
                <div class="stat-card">
                    <div>المهام</div>
                    <div class="stat-value" id="tasksCount">0/0</div>
                </div>
                <div class="stat-card">
                    <div>🏆 الإنجازات</div>
                    <div class="stat-value" id="achievementsCount">0</div>
                </div>
            </div>
        </header>

        <div class="shop-section">
            <h2>🛒 متجر الأفاتار</h2>
            <div class="shop-items" id="shopItems">
                <div class="shop-item" data-item="emoji1" data-price="30">
                    <div class="shop-item-emoji">⏰</div>
                    <div>منبه</div>
                    <div class="shop-item-price">30 نقطة</div>
                </div>
                <div class="shop-item" data-item="emoji2" data-price="40">
                    <div class="shop-item-emoji">📚</div>
                    <div>كتب</div>
                    <div class="shop-item-price">40 نقطة</div>
                </div>
                <div class="shop-item" data-item="emoji3" data-price="60">
                    <div class="shop-item-emoji">💪</div>
                    <div>قوة</div>
                    <div class="shop-item-price">60 نقطة</div>
                </div>
                <div class="shop-item" data-item="emoji4" data-price="80">
                    <div class="shop-item-emoji">🏆</div>
                    <div>كأس</div>
                    <div class="shop-item-price">80 نقطة</div>
                </div>
                <div class="shop-item" data-item="emoji5" data-price="100">
                    <div class="shop-item-emoji">👑</div>
                    <div>تاج</div>
                    <div class="shop-item-price">100 نقطة</div>
                </div>
                <div class="shop-item" data-item="emoji6" data-price="120">
                    <div class="shop-item-emoji">🔥</div>
                    <div>لهب</div>
                    <div class="shop-item-price">120 نقطة</div>
                </div>
                <div class="shop-item" data-item="emoji7" data-price="150">
                    <div class="shop-item-emoji">🚀</div>
                    <div>صاروخ</div>
                    <div class="shop-item-price">150 نقطة</div>
                </div>
                <div class="shop-item" data-item="emoji8" data-price="200">
                    <div class="shop-item-emoji">💎</div>
                    <div>ألماسة</div>
                    <div class="shop-item-price">200 نقطة</div>
                </div>
            </div>
        </div>

        <div class="add-task-section">
            <h2>➕ إضافة مهمة جديدة</h2>
            <div class="add-task-form">
                <input type="text" id="taskNameInput" placeholder="شنو تريدين تنجزين اليوم؟">
                <select id="taskPointsSelect">
                    <option value="10">🐣 سهل - 10 نقاط</option>
                    <option value="20">⚡ متوسط - 20 نقطة</option>
                    <option value="30">🔥 صعب - 30 نقطة</option>
                    <option value="50">💀 تحدي - 50 نقطة</option>
                </select>
                <button id="addTaskBtn">إضافة</button>
            </div>
        </div>

        <div class="challenges-section">
            <h2>⚡ تحديات اليوم</h2>
            <div id="dailyChallenges"></div>
        </div>

        <div class="tasks-section">
            <h2>📋 مهاماتي</h2>
            <div id="tasksList"></div>
        </div>
        
        <div class="progress-message" id="progressMessage"></div>
    </div>

    <script>
        let user = {
            points: 0,
            level: 1,
            streak: 0,
            avatar: "🌱",
            achievements: 0,
            lastVisit: null,
            ownedItems: ["🌱"]
        };

        let tasks = [];
        let taskIdCounter = 1;

        const shopItems = [
            { emoji: "⏰", name: "منبه", price: 30, id: "emoji1" },
            { emoji: "📚", name: "كتب", price: 40, id: "emoji2" },
            { emoji: "💪", name: "قوة", price: 60, id: "emoji3" },
            { emoji: "🏆", name: "كأس", price: 80, id: "emoji4" },
            { emoji: "👑", name: "تاج", price: 100, id: "emoji5" },
            { emoji: "🔥", name: "لهب", price: 120, id: "emoji6" },
            { emoji: "🚀", name: "صاروخ", price: 150, id: "emoji7" },
            { emoji: "💎", name: "ألماسة", price: 200, id: "emoji8" }
        ];

        let dailyChallenges = [
            { name: "🔥 أنجزي 3 مهام قبل الظهر", completed: false, points: 30 },
            { name: "⭐ أنجزي 5 مهام متتالية", completed: false, points: 50 },
            { name: "💫 أكمل مهمة بعد منتصف الليل", completed: false, points: 40 }
        ];

        const levelQuotes = {
            1: "كل رحلة تبدأ بخطوة 👣",
            2: "أنتِ في الطريق الصحيح 🛤️",
            3: "ما يوقفج إلا الجدار 🧱",
            4: "إنجازج يتكلم عنج 🗣️",
            5: "منج إلهام للجميع ✨"
        };

        const levelAvatars = {
            1: "🌱",
            2: "🌿",
            3: "🌳",
            4: "👑",
            5: "🔥"
        };

        function showMessage(msg) {
            let msgBox = document.getElementById('progressMessage');
            msgBox.textContent = msg;
            msgBox.style.display = 'block';
            setTimeout(function() {
                msgBox.style.display = 'none';
            }, 3000);
        }

        function checkStreak() {
            let today = new Date().toDateString();
            let lastVisit = localStorage.getItem('taskquest_lastVisit');
            
            if (lastVisit === today) {
                return;
            }
            
            if (lastVisit) {
                let lastDate = new Date(lastVisit);
                let yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                
                if (lastDate.toDateString() === yesterday.toDateString()) {
                    user.streak++;
                    if (user.streak === 7) {
                        showMessage("✨ أسبوع كامل من الإنجاز! فخورة فيج ✨");
                    }
                } else {
                    user.streak = 1;
                    showMessage("🔄 بداية سلسلة جديدة ... شدي حيلج!");
                }
            } else {
                user.streak = 1;
            }
            
            localStorage.setItem('taskquest_lastVisit', today);
            updateUI();
        }

        function updateLevel() {
            let oldLevel = user.level;
            
            if (user.points >= 500) {
                user.level = 5;
            } else if (user.points >= 300) {
                user.level = 4;
            } else if (user.points >= 150) {
                user.level = 3;
            } else if (user.points >= 50) {
                user.level = 2;
            } else {
                user.level = 1;
            }

            if (user.level > oldLevel) {
                showMessage(`🎉 مبروك! ترقيتي للمستوى ${user.level} 🎉`);
                if (!user.ownedItems.includes(levelAvatars[user.level])) {
                    user.ownedItems.push(levelAvatars[user.level]);
                }
            }

            document.body.className = '';
            document.body.classList.add(`level-${user.level}`);

            let levelNames = ["مبتدئ", "نشيطة", "بطلة", "أسطورة", "خارقة"];
            document.getElementById('levelDisplay').textContent = `مستوى ${user.level} - ${levelNames[user.level-1]}`;
            document.getElementById('motivationQuote').textContent = levelQuotes[user.level];
        }

        function addTask() {
            let taskName = document.getElementById('taskNameInput').value.trim();
            let taskPoints = parseInt(document.getElementById('taskPointsSelect').value);

            if (!taskName) {
                alert('دخلي اسم المهمة');
                return;
            }

            let task = {
                id: taskIdCounter++,
                name: taskName,
                points: taskPoints,
                completed: false
            };

            tasks.push(task);
            document.getElementById('taskNameInput').value = '';
            showMessage("✅ تمت إضافة المهمة! شدي حيلج");
            updateUI();
        }

        function completeTask(taskId) {
            for (let i = 0; i < tasks.length; i++) {
                if (tasks[i].id === taskId && !tasks[i].completed) {
                    tasks[i].completed = true;
                    user.points += tasks[i].points;
                    
                    showMessage(`🎯 مبروك! +${tasks[i].points} نقطة`);
                    
                    let completedCount = 0;
                    for (let j = 0; j < tasks.length; j++) {
                        if (tasks[j].completed) completedCount++;
                    }
                    
                    if (completedCount === 5) {
                        user.achievements++;
                        showMessage("🏅 أنجزتي 5 مهام! أول إنجاز");
                    }
                    if (completedCount === 10) {
                        user.achievements++;
                        showMessage("⭐ 10 مهام! طموحج عالي");
                    }
                    if (completedCount === 25) {
                        user.achievements++;
                        showMessage("💫 25 مهمة! شكد أنتِ ملهمة");
                    }

                    checkDailyChallenges();
                    updateLevel();
                    updateUI();
                    break;
                }
            }
        }

        function deleteTask(taskId) {
            let newTasks = [];
            for (let i = 0; i < tasks.length; i++) {
                if (tasks[i].id !== taskId) {
                    newTasks.push(tasks[i]);
                }
            }
            tasks = newTasks;
            showMessage("🗑️ تم حذف المهمة");
            updateUI();
        }

        function checkDailyChallenges() {
            let completedTasks = 0;
            for (let i = 0; i < tasks.length; i++) {
                if (tasks[i].completed) completedTasks++;
            }

            if (completedTasks >= 3 && !dailyChallenges[0].completed) {
                dailyChallenges[0].completed = true;
                user.points += dailyChallenges[0].points;
                user.achievements++;
                showMessage("🔥 تحدي 3 مهام قبل الظهر! مبروك");
            }

            let consecutiveCount = 0;
            for (let i = 0; i < tasks.length; i++) {
                if (tasks[i].completed) {
                    consecutiveCount++;
                    if (consecutiveCount >= 5 && !dailyChallenges[1].completed) {
                        dailyChallenges[1].completed = true;
                        user.points += dailyChallenges[1].points;
                        user.achievements++;
                        showMessage("⭐ 5 مهام متتالية! إرادة قوية");
                        break;
                    }
                } else {
                    consecutiveCount = 0;
                }
            }

            let now = new Date();
            if (now.getHours() >= 0 && now.getHours() < 6) {
                for (let i = 0; i < tasks.length; i++) {
                    if (tasks[i].completed && !dailyChallenges[2].completed) {
                        dailyChallenges[2].completed = true;
                        user.points += dailyChallenges[2].points;
                        user.achievements++;
                        showMessage("💫 مبروك! أنجزتي مهمة بالليل");
                        break;
                    }
                }
            }
        }

        function buyItem(itemId) {
            let item = null;
            for (let i = 0; i < shopItems.length; i++) {
                if (shopItems[i].id === itemId) {
                    item = shopItems[i];
                    break;
                }
            }

            if (!item) return;

            if (user.points >= item.price) {
                let alreadyOwned = false;
                for (let i = 0; i < user.ownedItems.length; i++) {
                    if (user.ownedItems[i] === item.emoji) {
                        alreadyOwned = true;
                        break;
                    }
                }

                if (!alreadyOwned) {
                    user.points -= item.price;
                    user.ownedItems.push(item.emoji);
                    user.avatar = item.emoji;
                    document.getElementById('avatarEmoji').textContent = user.avatar;
                    showMessage(`🛒 اشتريتي ${item.name}! شكلج حلو`);
                    updateUI();
                } else {
                    showMessage("✅ عندج هالإيموجي مسبقاً");
                }
            } else {
                showMessage("💔 ما عندج نقاط كافية .. شدي حيلج");
            }
        }

        function updateUI() {
            document.getElementById('pointsDisplay').textContent = user.points;
            document.getElementById('streakDisplay').textContent = user.streak;
            document.getElementById('avatarEmoji').textContent = user.avatar;
            
            let completedCount = 0;
            for (let i = 0; i < tasks.length; i++) {
                if (tasks[i].completed) completedCount++;
            }
            document.getElementById('tasksCount').textContent = `${completedCount}/${tasks.length}`;
            document.getElementById('achievementsCount').textContent = user.achievements;

            let tasksList = document.getElementById('tasksList');
            tasksList.innerHTML = '';
            
            for (let i = 0; i < tasks.length; i++) {
                let task = tasks[i];
                let taskDiv = document.createElement('div');
                taskDiv.className = `task-item ${task.completed ? 'completed' : ''}`;
                
                taskDiv.innerHTML = `
                    <div class="task-info">
                        <span>${task.name}</span>
                        <span class="task-points">${task.points} نقطة</span>
                    </div>
                    <div>
                        ${!task.completed ? `<span class="complete-btn" onclick="completeTask(${task.id})">إنجاز</span>` : ''}
                        <span class="delete-btn" onclick="deleteTask(${task.id})">❌</span>
                    </div>
                `;
                
                tasksList.appendChild(taskDiv);
            }

            let challengesDiv = document.getElementById('dailyChallenges');
            challengesDiv.innerHTML = '';
            
            for (let i = 0; i < dailyChallenges.length; i++) {
                let challenge = dailyChallenges[i];
                let challengeDiv = document.createElement('div');
                challengeDiv.className = 'challenge-item';
                challengeDiv.style.background = challenge.completed ? 'rgba(0,255,0,0.2)' : 'rgba(255,0,0,0.2)';
                challengeDiv.style.borderColor = challenge.completed ? '#4CAF50' : '#ff4444';
                
                challengeDiv.innerHTML = `
                    <span>${challenge.name}</span>
                    <span>${challenge.completed ? '✅' : `${challenge.points} نقطة`}</span>
                `;
                
                challengesDiv.appendChild(challengeDiv);
            }

            let shopDivs = document.querySelectorAll('.shop-item');
            for (let i = 0; i < shopDivs.length; i++) {
                let item = shopDivs[i];
                
                let owned = false;
                for (let j = 0; j < user.ownedItems.length; j++) {
                    if (user.ownedItems[j] === shopItems[i].emoji) {
                        owned = true;
                        break;
                    }
                }
                
                if (owned) {
                    item.classList.add('disabled');
                } else {
                    item.classList.remove('disabled');
                }
            }
        }

        document.getElementById('addTaskBtn').addEventListener('click', addTask);

        document.getElementById('taskNameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        document.getElementById('avatarEmoji').addEventListener('click', function() {
            if (user.ownedItems.length > 1) {
                let nextAvatar = 0;
                for (let i = 0; i < user.ownedItems.length; i++) {
                    if (user.ownedItems[i] === user.avatar) {
                        nextAvatar = (i + 1) % user.ownedItems.length;
                        break;
                    }
                }
                user.avatar = user.ownedItems[nextAvatar];
                document.getElementById('avatarEmoji').textContent = user.avatar;
                showMessage("✨ غيرتي شكلج! حلو");
            }
        });

        let shopItemElements = document.querySelectorAll('.shop-item');
        for (let i = 0; i < shopItemElements.length; i++) {
            shopItemElements[i].addEventListener('click', function() {
                let itemId = this.getAttribute('data-item');
                buyItem(itemId);
            });
        }

        let savedTasks = localStorage.getItem('taskquest_tasks');
        if (savedTasks) {
            try {
                tasks = JSON.parse(savedTasks);
                taskIdCounter = tasks.length + 1;
            } catch (e) {
                tasks = [];
            }
        }

        let savedUser = localStorage.getItem('taskquest_user');
        if (savedUser) {
            try {
                let parsed = JSON.parse(savedUser);
                user.points = parsed.points || 0;
                user.level = parsed.level || 1;
                user.streak = parsed.streak || 0;
                user.avatar = parsed.avatar || "🌱";
                user.achievements = parsed.achievements || 0;
                user.ownedItems = parsed.ownedItems || ["🌱"];
            } catch (e) {
                user = {
                    points: 0,
                    level: 1,
                    streak: 0,
                    avatar: "🌱",
                    achievements: 0,
                    lastVisit: null,
                    ownedItems: ["🌱"]
                };
            }
        }

        checkStreak();
        updateLevel();
        updateUI();

        setInterval(function() {
            try {
                localStorage.setItem('taskquest_tasks', JSON.stringify(tasks));
                localStorage.setItem('taskquest_user', JSON.stringify(user));
            } catch (e) {}
        }, 5000);
    </script>
</body>
</html>
